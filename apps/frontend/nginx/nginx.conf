# TrustedOSS Portal — top-level nginx config for the production frontend.
#
# Tuned for a small static SPA fronted by Traefik. Traefik does TLS,
# HTTP/2, and gzip; nginx here just serves the bundle from disk.
#
# Run as the unprivileged `nginx` user. Pid + tmp paths point at /tmp so
# a read-only root filesystem still works (Helm chart in Phase B will
# enable readOnlyRootFilesystem on the pod spec).

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /tmp/nginx.pid;

events {
  worker_connections 1024;
}

http {
  # Use /tmp for buffered uploads / temp files so root-FS stays readonly-friendly.
  client_body_temp_path /tmp/nginx-client-body;
  proxy_temp_path       /tmp/nginx-proxy;
  fastcgi_temp_path     /tmp/nginx-fastcgi;
  uwsgi_temp_path       /tmp/nginx-uwsgi;
  scgi_temp_path        /tmp/nginx-scgi;

  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  # JSON-style access log so the prod log pipeline can ingest it without a
  # bespoke parser. Format mirrors structlog's JSON line shape on the
  # backend so Loki / Grafana queries can correlate by request_id.
  log_format json_combined escape=json
    '{'
      '"timestamp":"$time_iso8601",'
      '"remote_addr":"$remote_addr",'
      '"request":"$request",'
      '"status":$status,'
      '"bytes_sent":$body_bytes_sent,'
      '"referer":"$http_referer",'
      '"user_agent":"$http_user_agent",'
      '"x_forwarded_for":"$http_x_forwarded_for",'
      '"request_id":"$http_x_request_id"'
    '}';

  access_log /var/log/nginx/access.log json_combined;

  sendfile on;
  tcp_nopush on;
  tcp_nodelay on;
  keepalive_timeout 65;
  server_tokens off;

  # Gzip handles small JSON / HTML responses; static assets are served
  # pre-compressed where possible. Traefik does its own gzip pass on the
  # outer hop.
  gzip on;
  gzip_vary on;
  gzip_proxied any;
  gzip_comp_level 5;
  gzip_min_length 1024;
  gzip_types
    text/plain
    text/css
    text/javascript
    application/javascript
    application/json
    application/xml
    image/svg+xml;

  include /etc/nginx/conf.d/*.conf;
}
