# SPA virtual host — serves the Vite bundle out of /usr/share/nginx/html
# with a try_files fallback so client-side routes (/projects/:id, /admin,
# etc.) hit index.html instead of 404'ing.
#
# `/api` is NOT proxied here. Traefik routes `/api/*` directly to the
# backend service at the edge, so the SPA and API share an origin without
# nginx ever proxying an internal hop.

server {
  listen 8080;
  listen [::]:8080;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Liveness probe used by docker-compose / Helm. Static, no filesystem hit.
  location = /healthz {
    access_log off;
    add_header Content-Type text/plain;
    return 200 "ok\n";
  }

  # Static assets from Vite carry an immutable content hash in the
  # filename (e.g. /assets/index-abc123.js). Cache them aggressively;
  # index.html stays no-cache so a redeploy is picked up immediately.
  location ~* ^/assets/.*\.(js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|webp|ico)$ {
    expires 1y;
    add_header Cache-Control "public, immutable" always;
    try_files $uri =404;
  }

  # Locale JSON files (react-i18next) — short cache so a translation fix
  # rolls out quickly.
  location ~* ^/locales/.*\.json$ {
    expires 5m;
    add_header Cache-Control "public, max-age=300" always;
    try_files $uri =404;
  }

  # SPA fallback: anything else falls through to index.html so React
  # Router can resolve the route on the client.
  location / {
    add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    try_files $uri $uri/ /index.html;
  }
}
