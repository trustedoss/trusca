[tool.pytest.ini_options]
asyncio_mode = "auto"
# Pin the async-fixture event-loop scope explicitly. pytest-asyncio 1.x makes
# this configurable and warns when it is unset; "function" preserves the
# per-test loop behaviour the suite ran under with pytest-asyncio 0.24 (the
# root `_isolate_engine_per_test` autouse fixture is function-scoped), so the
# 8->9 upgrade is behaviour-preserving.
asyncio_default_fixture_loop_scope = "function"
testpaths = ["tests"]
pythonpath = ["."]
markers = [
    "integration: requires DATABASE_URL (and usually REDIS_URL) — runs against real services",
    "golden: real-stack golden-fixture drift gate (Tier 1) — nightly only; lives under tests/e2e/ which the PR run (tests/unit tests/integration) does not collect",
]

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP", "S"]
ignore = ["S101"]  # assert in tests is fine

[tool.ruff.lint.per-file-ignores]
"tests/**" = ["S", "B"]
"alembic/**" = ["S", "B"]
# FastAPI idiomatic code:
#   - B008: `Depends(...)` in defaults is the framework's documented signature.
#   - S105/S106: token_type="bearer" and TOKEN_TYPE_ACCESS/REFRESH constants
#     trigger ruff's "hardcoded password" heuristic, which has no notion of
#     OAuth2 vocabulary. The values are public protocol strings.
"api/**" = ["B008", "S105", "S106"]
"core/security.py" = ["B008", "S105", "S106"]
"core/api_key_auth.py" = ["B008", "S105", "S106"]
"schemas/**" = ["S105", "S106"]

[tool.mypy]
python_version = "3.12"
strict = true
ignore_missing_imports = true
exclude = ["alembic/versions/"]

# pytest fixtures/decorators frequently need looser typing (untyped decorators
# from third-party libs, ad-hoc test helpers). Strict mode applies to product
# code; tests get the recommended pytest defaults. We further turn off
# check_untyped_defs for tests because the spec harnesses use duck-typed fake
# objects (e.g. _FakeUser stand-ins for CurrentUser) that mypy cannot reason
# about without a runtime Protocol. warn_unused_ignores is also relaxed: spec
# test files carry `# type: ignore` comments that production code may make
# unnecessary, and we don't want product changes blocking on stale comments
# in the test harnesses.
[[tool.mypy.overrides]]
module = "tests.*"
disallow_untyped_defs = false
disallow_incomplete_defs = false
disallow_untyped_decorators = false
check_untyped_defs = false
warn_unused_ignores = false
# The real-stack harnesses (e.g. tests/e2e/golden/run_golden.py) call ad-hoc
# helpers and use bare ``dict`` annotations; under strict mode those surface as
# [no-untyped-call] / [type-arg]. Relax both for tests only — product code
# keeps strict calls and generics.
disallow_untyped_calls = false
disallow_any_generics = false
# Spec tests pass duck-typed fakes (_FakeSession, SimpleNamespace) where the
# product signature wants Session / CurrentUser (see the _FakeUser note above);
# mypy can't reason about those stand-ins, so [arg-type] is relaxed for tests
# only. Product code keeps strict argument typing.
disable_error_code = ["arg-type"]

# CLAUDE.md 품질·보안·운영 표준 §2: PR 머지 게이트는 신규/변경 코드
# line coverage ≥ 80%. 부트스트랩 단계에서는 전역 라인 임계로 근사한다.
[tool.coverage.run]
source = ["."]
# greenlet support is required because SQLAlchemy 2.x async runs the actual
# DB I/O on a greenlet spawned by `greenlet_spawn` — without this, lines
# inside `async def` functions that touch the DB are reported as missed
# even when the test passes through them.
concurrency = ["greenlet", "thread"]
omit = [
    "alembic/versions/*",
    "tests/*",
]

[tool.coverage.report]
fail_under = 80
show_missing = true
skip_covered = false
