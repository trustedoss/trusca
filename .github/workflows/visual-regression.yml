name: visual-regression

# Marathon bundle 9 (4b) — Playwright visual regression gate.
#
# Triggers on PRs that touch the frontend, backend API surface, or
# the visual baselines themselves. Spins up the dev stack via
# docker-compose, runs the visual spec, and compares fresh captures
# against the baselines committed under
# ``apps/frontend/tests/visual/visual.spec.ts-snapshots/``.
#
# This is a separate workflow (not a job inside ci.yml) for two
# reasons:
#   1. The compose stack spin-up + Playwright cache restore costs
#      ~3 minutes per run; cross-firing it on every doc-only PR
#      would be wasted CI minutes. The path filter caps the cost.
#   2. The threshold + label-override semantics need to stay
#      isolated from the e2e matrix's pass/fail criteria. A label
#      override on visual regression must not also let the e2e
#      suite slip.
#
# Threshold + tolerance live in playwright.visual.config.ts:
#   maxDiffPixelRatio: 0.15
#   threshold: 0.2 (per-pixel color delta)
#
# Override: label the PR ``visual-regression-skip`` to bypass the
# gate when a layout change is intentional and the baselines have
# not yet been refreshed. Update baselines locally with:
#   cd apps/frontend
#   npx playwright test --config=playwright.visual.config.ts \
#                       --update-snapshots
# and commit the resulting PNGs in
# ``tests/visual/visual.spec.ts-snapshots/``. Then drop the label.
#
# Bootstrap note: the initial baselines committed in PR #82 were
# captured on darwin and will diverge from a linux runner by
# 5-20 % on text-heavy frames due to font-hinting variance. The
# job is therefore set to ``continue-on-error: true`` for the
# first iteration; a follow-up PR refreshes the baselines from
# a linux runner (via this workflow's --update-snapshots step)
# and flips the gate to strict.

on:
  # Nightly only — the matrix takes ~8 minutes per run and would double
  # the typical PR wall-clock. workflow_dispatch is still wired up so a
  # maintainer can verify before a risky merge. PR-triggered runs are
  # intentionally NOT in scope; the dev / preview flow catches visual
  # drift before merge, and the nightly cadence surfaces drift on main
  # that slipped past PR review.
  schedule:
    - cron: "30 4 * * *"
  workflow_dispatch: {}

permissions:
  contents: read
  pull-requests: read

jobs:
  visual-regression:
    runs-on: ubuntu-22.04
    timeout-minutes: 25
    # Initial bootstrap — see workflow header note. Flip to ``false``
    # after the first linux-baseline-refresh PR merges.
    continue-on-error: true

    env:
      DATABASE_URL: postgresql+asyncpg://trustedoss:trustedoss@postgres:5432/trustedoss
      DATABASE_URL_OWNER: postgresql+asyncpg://trustedoss:trustedoss@postgres:5432/trustedoss
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ci-visual-secret-key-min-32-chars-padding-aabbcc
      DT_URL: http://dtrack-api:8080
      DT_API_KEY: ci-visual-dt-stub-key
      WORKSPACE_HOST_PATH: ${{ github.workspace }}/workspace
      DISABLE_LOGIN_RATE_LIMIT: "1"
      # /health/ready returns 200 only after Alembic schema is at HEAD.
      # Without AUTO_MIGRATE the backend never runs `alembic upgrade head`
      # on its own; the workflow's explicit migrate step only fires AFTER
      # the wait-for-healthy loop times out. Same fix as ci.yml e2e.
      AUTO_MIGRATE: "true"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/frontend/package-lock.json

      # Backend deps are installed on the host runner only because the
      # Playwright harness (`tests/_harness/seed.ts`) spawns `python3
      # apps/backend/scripts/seed_e2e_user.py` directly during globalSetup;
      # the script imports SQLAlchemy + asyncpg + bcrypt and uses
      # `from datetime import UTC` (Python 3.11+). Without this step the
      # runner's system python (3.10 on ubuntu-22.04) raises
      # `ImportError: cannot import name 'UTC'`. Mirrors ci.yml's e2e job.
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: apps/backend/requirements-dev.txt

      - name: Install backend deps (for host-side seed)
        working-directory: apps/backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Install frontend deps
        working-directory: apps/frontend
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-1.48.2

      - name: Install Playwright (chromium only)
        working-directory: apps/frontend
        run: npx playwright install --with-deps chromium

      # Pre-build the backend / worker / frontend images BEFORE bringing the
      # stack up — the dev compose image refs are unpublished so compose
      # falls back to local build during `up -d`, which on a cold runner
      # would spill past the 180-second healthcheck deadline below. Same
      # split as ci.yml e2e.
      - name: Pre-build dev images
        env:
          COMPOSE_DOCKER_CLI_BUILD: "1"
          DOCKER_BUILDKIT: "1"
        run: |
          docker compose -f docker-compose.dev.yml build \
            backend celery-worker frontend

      # The dev Dockerfile has no ENTRYPOINT so docker-entrypoint.sh
      # (which honours AUTO_MIGRATE) never runs. Migrate explicitly in a
      # throwaway backend container BEFORE the live backend starts, so
      # /health/ready can flip green on the first probe. Same pattern as
      # ci.yml e2e.
      - name: Start postgres + redis only
        run: |
          mkdir -p workspace
          docker compose -f docker-compose.dev.yml up -d postgres redis
        env:
          COMPOSE_DOCKER_CLI_BUILD: "1"
          DOCKER_BUILDKIT: "1"

      - name: Wait for postgres healthy
        run: |
          set -euo pipefail
          deadline=$(( $(date +%s) + 60 ))
          while :; do
            cid=$(docker compose -f docker-compose.dev.yml ps -q postgres)
            status=$(docker inspect -f '{{.State.Health.Status}}' "$cid" 2>/dev/null || echo none)
            [ "$status" = "healthy" ] && break
            [ "$(date +%s)" -ge "$deadline" ] && { echo "::error::postgres never healthy"; exit 1; }
            sleep 3
          done

      - name: Run alembic migrations (pre-boot)
        run: |
          docker compose -f docker-compose.dev.yml run --rm --no-deps backend \
            alembic upgrade head

      - name: Bring up the rest of the stack
        run: |
          docker compose -f docker-compose.dev.yml up -d \
            backend celery-worker frontend

      - name: Wait for services to be healthy
        # Deadline bumped 180 → 240s. Alembic upgrade + uvicorn boot on a
        # cold cache regularly used the full 180-second budget; the
        # pre-build step caps total wall clock while 240s leaves headroom.
        run: |
          services=(postgres redis backend celery-worker frontend)
          deadline=$((SECONDS + 240))
          while [ "$SECONDS" -lt "$deadline" ]; do
            healthy=0
            for svc in "${services[@]}"; do
              cid=$(docker compose -f docker-compose.dev.yml ps -q "$svc")
              if [ -z "$cid" ]; then continue; fi
              status=$(docker inspect -f '{{.State.Health.Status}}' "$cid" 2>/dev/null || echo unknown)
              if [ "$status" = "healthy" ] || [ "$status" = "unknown" ]; then
                state=$(docker inspect -f '{{.State.Status}}' "$cid")
                [ "$state" = "running" ] && healthy=$((healthy + 1))
              fi
            done
            echo "healthy=$healthy/${#services[@]}"
            if [ "$healthy" -eq "${#services[@]}" ]; then
              echo "✓ stack healthy"; break
            fi
            sleep 5
          done

      - name: Run visual regression spec
        working-directory: apps/frontend
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:5173
          # The harness `seed.ts` (globalSetup) spawns python3 against the
          # docker-compose Postgres mapped to localhost:5432. The job-level
          # DATABASE_URL points at `postgres:5432`, which only resolves inside
          # the compose network — the host-side seed needs the published port
          # on localhost. Mirrors ci.yml's e2e "Run Playwright" step.
          DATABASE_URL: postgresql+asyncpg://trustedoss:trustedoss@localhost:5432/trustedoss
          APP_ENV: dev
          PYTHON: python3
          CI: "true"
        run: |
          npx playwright test --config=playwright.visual.config.ts

      - name: Upload diff artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: visual-regression-diffs
          path: |
            apps/frontend/tests/visual/.output/
            apps/frontend/tests/visual/.report/
          if-no-files-found: ignore
          retention-days: 7

      - name: Dump container logs on failure
        if: failure()
        run: |
          docker compose -f docker-compose.dev.yml ps
          docker compose -f docker-compose.dev.yml logs --tail 200 backend celery-worker frontend
