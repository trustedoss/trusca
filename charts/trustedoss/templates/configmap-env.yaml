{{/*
Shared non-secret environment for backend / worker / beat.

Every key maps 1:1 to an os.getenv() accessor in
apps/backend/core/config.py and to the docker-compose `${VAR:-default}`
defaults. Secrets (DATABASE_URL, SECRET_KEY) are injected separately via
Secret references in the Deployments — they are intentionally NOT here.
*/}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "trustedoss.fullname" . }}-env
  labels:
    {{- include "trustedoss.labels" . | nindent 4 }}
data:
  APP_ENV: {{ .Values.env.appEnv | quote }}
  LOG_LEVEL: {{ .Values.env.logLevel | quote }}
  CORS_ALLOWED_ORIGINS: {{ .Values.env.corsAllowedOrigins | quote }}
  ACCESS_TOKEN_EXPIRE_MINUTES: {{ .Values.env.accessTokenExpireMinutes | quote }}
  REFRESH_TOKEN_EXPIRE_DAYS: {{ .Values.env.refreshTokenExpireDays | quote }}

  # B3: AUTO_MIGRATE=false on every workload — the Helm migration Job (a
  # pre-install/pre-upgrade hook) is the SOLE migrator. The advisory lock in
  # alembic/env.py remains a safety net, but pods never run alembic on start.
  AUTO_MIGRATE: "false"

  # Shared scan workspace mount (WORKSPACE_HOST_PATH). backend + worker mount
  # the same PVC here so cdxgen / scancode outputs are readable across both.
  WORKSPACE_HOST_PATH: {{ .Values.workspace.mountPath | quote }}

  {{- /* REDIS_URL is secret-backed (it may carry a password) — see secret.yaml
         + trustedoss.runtimeSecretEnv. Not emitted here. */ -}}

  # ---- Trivy DB (v2.4.0+, ADR-0001) ----
  # Worker reads `TRIVY_DB_REPOSITORY` to pull the cached DB; air-gapped sites
  # override with an internal OCI mirror via env.trivy.dbRepository.
  TRIVY_DB_REPOSITORY: {{ .Values.env.trivy.dbRepository | quote }}
  TRIVY_DB_REFRESH_HOURS: {{ .Values.env.trivy.dbRefreshHours | quote }}
  TRIVY_DB_CACHE_DIR: {{ .Values.env.trivy.dbCacheDir | quote }}
  TRIVY_TIMEOUT_SECONDS: {{ .Values.env.trivy.timeoutSeconds | quote }}

  # ---- DB connection pool (B1) ----
  DB_POOL_SIZE: {{ .Values.env.dbPool.size | quote }}
  DB_MAX_OVERFLOW: {{ .Values.env.dbPool.maxOverflow | quote }}
  DB_POOL_TIMEOUT: {{ .Values.env.dbPool.timeout | quote }}
  DB_POOL_RECYCLE: {{ .Values.env.dbPool.recycle | quote }}
  DB_SYNC_POOL_SIZE: {{ .Values.env.dbPool.syncSize | quote }}
  DB_SYNC_MAX_OVERFLOW: {{ .Values.env.dbPool.syncMaxOverflow | quote }}
  DB_SYNC_POOL_TIMEOUT: {{ .Values.env.dbPool.syncTimeout | quote }}
  DB_SYNC_POOL_RECYCLE: {{ .Values.env.dbPool.syncRecycle | quote }}

  # ---- Scan controls (B1 + A1) ----
  SCAN_TRIGGER_RATE_LIMIT: {{ .Values.env.scan.triggerRateLimit | quote }}
  SCAN_CONCURRENCY_CAP_PER_TEAM: {{ .Values.env.scan.concurrencyCapPerTeam | quote }}
  SCAN_SOFT_TIME_LIMIT_SECONDS: {{ .Values.env.scan.softTimeLimitSeconds | quote }}
  SCAN_HARD_TIME_LIMIT_SECONDS: {{ .Values.env.scan.hardTimeLimitSeconds | quote }}
  WORKSPACE_ORPHAN_MAX_AGE_SECONDS: {{ .Values.env.scan.workspaceOrphanMaxAgeSeconds | quote }}

  # ---- scancode guards (A2) ----
  SCANCODE_TIMEOUT_SECONDS: {{ .Values.env.scancode.timeoutSeconds | quote }}
  SCANCODE_MAX_FILES: {{ .Values.env.scancode.maxFiles | quote }}
  SCANCODE_MAX_DETECTIONS: {{ .Values.env.scancode.maxDetections | quote }}
  # maxResultBytes is large enough that YAML/Helm would otherwise render it in
  # scientific notation ("2.68e+08"), which the backend's int(os.getenv(...))
  # cannot parse. int64 forces a plain-integer string.
  SCANCODE_MAX_RESULT_BYTES: {{ .Values.env.scancode.maxResultBytes | int64 | quote }}
