{{- /*
Application Secret — DSNs (app + owner), REDIS_URL, SECRET_KEY.

Rendered ONLY when env.secret.existingSecret is unset. When the operator
supplies an existingSecret, this file emits nothing and the workloads /
migration Job reference that Secret directly (it MUST carry the same keys:
DATABASE_URL_APP, DATABASE_URL_OWNER, REDIS_URL, SECRET_KEY).

Chart 0.3.0 (W6 / ADR-0001) — DT_API_KEY removed: vulnerability matching
no longer talks to an external service.

Passwords for the bundled Postgres are URL-encoded into the DSN by the
trustedoss.postgres.*Dsn helpers, so special characters survive asyncpg's
parser. Everything here lives in a Secret (stringData) — never in the
ConfigMap and never in Terraform-style plaintext.
*/ -}}
{{- if eq (include "trustedoss.createSecret" .) "true" -}}

{{- /* ---- Resolve SECRET_KEY (required) ---- */ -}}
{{- if not .Values.env.secret.secretKey -}}
{{- fail "env.secret.secretKey is required (>= 32 chars) when env.secret.existingSecret is unset. Generate one with `openssl rand -hex 32`." -}}
{{- end -}}

{{- /* ---- Resolve the runtime (app) DSN ---- */ -}}
{{- $appDsn := "" -}}
{{- if .Values.postgres.bundled -}}
  {{- if not .Values.postgres.auth.password -}}
    {{- fail "postgres.auth.password is required when postgres.bundled=true." -}}
  {{- end -}}
  {{- if and .Values.postgres.auth.roleSeparation (not .Values.postgres.auth.appPassword) -}}
    {{- fail "postgres.auth.appPassword is required when postgres.auth.roleSeparation=true." -}}
  {{- end -}}
  {{- $appDsn = include "trustedoss.postgres.appDsn" . -}}
{{- else -}}
  {{- if not .Values.env.database.url -}}
    {{- fail "env.database.url is required when postgres.bundled=false (and env.secret.existingSecret is unset)." -}}
  {{- end -}}
  {{- $appDsn = .Values.env.database.url -}}
{{- end -}}

{{- /* ---- Resolve the owner (DDL) DSN — falls back to the app DSN ---- */ -}}
{{- $ownerDsn := "" -}}
{{- if .Values.postgres.bundled -}}
  {{- $ownerDsn = include "trustedoss.postgres.ownerDsn" . -}}
{{- else if .Values.env.database.ownerUrl -}}
  {{- $ownerDsn = .Values.env.database.ownerUrl -}}
{{- else -}}
  {{- $ownerDsn = .Values.env.database.url -}}
{{- end -}}

{{- /* ---- Resolve REDIS_URL ---- */ -}}
{{- $redisUrl := "" -}}
{{- if .Values.redis.bundled -}}
  {{- $redisUrl = include "trustedoss.redis.url" . -}}
{{- else -}}
  {{- if not .Values.env.redis.url -}}
    {{- fail "env.redis.url is required when redis.bundled=false." -}}
  {{- end -}}
  {{- $redisUrl = .Values.env.redis.url -}}
{{- end -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "trustedoss.secretName" . }}
  labels:
    {{- include "trustedoss.labels" . | nindent 4 }}
  annotations:
    # Also a pre-install/pre-upgrade hook so the migration Job (a hook) can read
    # the DSNs before the main resources apply. Weight -20 → created first.
    # before-hook-creation (NOT hook-succeeded) so it persists for the runtime
    # pods after the hook phase. hook-failed deletes it on a failed release so a
    # rotated secret value is not left stale.
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-20"
    "helm.sh/hook-delete-policy": before-hook-creation
type: Opaque
stringData:
  DATABASE_URL_APP: {{ $appDsn | quote }}
  DATABASE_URL_OWNER: {{ $ownerDsn | quote }}
  REDIS_URL: {{ $redisUrl | quote }}
  SECRET_KEY: {{ .Values.env.secret.secretKey | quote }}
{{- end -}}
