{{- if .Values.serviceAccount.create -}}
{{- range $component := list "backend" "worker" "beat" "frontend" "migrate" }}
---
# One ServiceAccount per workload (least privilege). None request RBAC against
# the Kubernetes API — the app talks only to external Postgres / Redis.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "trustedoss.serviceAccountName" (dict "root" $ "component" $component) }}
  labels:
    {{- include "trustedoss.labels" $ | nindent 4 }}
    app.kubernetes.io/component: {{ $component }}
  {{- with $.Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
automountServiceAccountToken: false
{{- end }}
{{- end }}
