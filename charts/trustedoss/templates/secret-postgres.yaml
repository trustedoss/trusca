{{- /*
Bundled-Postgres auth Secret. Holds the superuser/owner credentials the
postgres image consumes (POSTGRES_USER/PASSWORD/DB) plus, under role
separation, the DML-only app role credentials the init script provisions.
Rendered ONLY when postgres.bundled=true.
*/ -}}
{{- if .Values.postgres.bundled -}}
{{- if not .Values.postgres.auth.password -}}
{{- fail "postgres.auth.password is required when postgres.bundled=true." -}}
{{- end -}}
{{- if and .Values.postgres.auth.roleSeparation (not .Values.postgres.auth.appPassword) -}}
{{- fail "postgres.auth.appPassword is required when postgres.auth.roleSeparation=true." -}}
{{- end -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "trustedoss.postgres.fullname" . }}-auth
  labels:
    {{- include "trustedoss.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgres
  annotations:
    # Hook (weight -20) so the bundled Postgres can be brought up before the
    # migration Job hook runs. Persists past the hook phase for the StatefulSet.
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-20"
    "helm.sh/hook-delete-policy": before-hook-creation
type: Opaque
stringData:
  POSTGRES_USER: {{ .Values.postgres.auth.username | quote }}
  POSTGRES_PASSWORD: {{ .Values.postgres.auth.password | quote }}
  POSTGRES_DB: {{ .Values.postgres.auth.database | quote }}
  {{- if .Values.postgres.auth.roleSeparation }}
  POSTGRES_APP_USER: {{ .Values.postgres.auth.appUsername | quote }}
  POSTGRES_APP_PASSWORD: {{ .Values.postgres.auth.appPassword | quote }}
  {{- end }}
{{- end -}}
