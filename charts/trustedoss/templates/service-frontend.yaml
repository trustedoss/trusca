apiVersion: v1
kind: Service
metadata:
  name: {{ include "trustedoss.fullname" . }}-frontend
  labels:
    {{- include "trustedoss.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
spec:
  type: ClusterIP
  ports:
    - name: http
      port: {{ .Values.frontend.port }}
      targetPort: http
      protocol: TCP
  selector:
    {{- include "trustedoss.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
