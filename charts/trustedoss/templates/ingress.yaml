{{- /*
Ingress — cert-manager TLS termination + host routing.

Path routing (B3): the backend (API) prefixes are listed FIRST so they win over
the SPA catch-all `/`:
  /v1, /auth, /ws, /health, /metrics → backend Service
  /                                   → frontend Service (React SPA)

cert-manager issues + renews the TLS cert via the ClusterIssuer named in
ingress.annotations (default letsencrypt-prod), writing it into the tls
secretName. Set ingress.host before installing.
*/ -}}
{{- if .Values.ingress.enabled -}}
{{- if not .Values.ingress.host -}}
{{- fail "ingress.host is required when ingress.enabled=true (set it to the portal's FQDN)." -}}
{{- end -}}
{{- $fullName := include "trustedoss.fullname" . -}}
{{- $tlsSecret := .Values.ingress.tls.secretName | default (printf "%s-tls" $fullName) -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ $fullName }}
  labels:
    {{- include "trustedoss.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  {{- if .Values.ingress.tls.enabled }}
  tls:
    - hosts:
        - {{ .Values.ingress.host | quote }}
      secretName: {{ $tlsSecret }}
  {{- end }}
  rules:
    - host: {{ .Values.ingress.host | quote }}
      http:
        paths:
          # ---- API → backend (most specific first) ----
          {{- range $prefix := list "/v1" "/auth" "/ws" "/health" "/metrics" }}
          - path: {{ $prefix }}
            pathType: Prefix
            backend:
              service:
                name: {{ $fullName }}-backend
                port:
                  number: {{ $.Values.backend.port }}
          {{- end }}
          # ---- SPA catch-all → frontend ----
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ $fullName }}-frontend
                port:
                  number: {{ .Values.frontend.port }}
{{- end -}}
