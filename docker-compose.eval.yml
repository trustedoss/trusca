# TrustedOSS Portal — EVALUATION overlay (v2.1 Track B / B2).
#
# Goal: stand the product up on a SMALL host (2 vCPU / 4 GB RAM) so an
# evaluator can click around a fully-seeded portal in minutes, instead of
# needing the 4 vCPU / 8 GB minimum the full prod stack (with a 4 GB
# Dependency-Track heap) demands.
#
# Compose V1 file format (CLAUDE.md core rule #10: `docker-compose`, not
# `docker compose`). No V2-only keys are used so it also parses under the V2
# plugin. Image tags stay pinned (rule #9: no `:latest`) — this overlay only
# changes resource budgets / command flags / Traefik mode, never the images.
#
# ---------------------------------------------------------------------------
# How to use — ALWAYS layer this ON TOP of the base prod compose:
# ---------------------------------------------------------------------------
#   One command (recommended):
#     APP_ENV=demo ./scripts/eval-up.sh
#
#   Or by hand:
#     docker-compose -f docker-compose.yml -f docker-compose.eval.yml up -d
#     # then seed the demo dataset (idempotent):
#     docker-compose -f docker-compose.yml -f docker-compose.eval.yml \
#       exec -T -e APP_ENV=demo backend python scripts/seed_demo.py
#
# ---------------------------------------------------------------------------
# DT-less by design
# ---------------------------------------------------------------------------
# This overlay deliberately does NOT bring up Dependency-Track (that lives in
# docker-compose.dt.yml and wants a 4 GB JVM heap — half the eval host's RAM).
# The portal works fine without DT because of the v1-fix architecture
# (CLAUDE.md "DT 연동 전략"): the DT client sits behind a circuit breaker, and
# vulnerability data is cached in PostgreSQL. With the breaker OPEN (no DT
# reachable) the portal serves the cached / seeded findings instead of erroring.
# `scripts/seed_demo.py` populates that cache with a realistic dataset (org / 3
# teams / 5 users / 5 projects / 10 CVEs / licenses / obligations /
# notifications), so the evaluator lands on a populated dashboard, not an empty
# one — without a single live scan or a running DT.
#
# To point at an EXTERNAL DT during eval (optional), add DT_URL + DT_API_KEY to
# your .env and layer the DT env overlay's backend/worker env on top, OR simply
# uncomment the two env lines under `backend:` / `worker:` below. Leaving them
# unset keeps the breaker OPEN, which is a valid eval posture.
#
# ---------------------------------------------------------------------------
# Resource budget — fits 2 vCPU / 4 GB
# ---------------------------------------------------------------------------
# `deploy.resources.limits` are honoured by `docker-compose up` on a non-Swarm
# host only as a hint unless you pass `--compatibility`; eval-up.sh passes it so
# the caps below actually bind. The point is to keep ANY one container from
# eating the whole host. Rough steady-state budget (limits; real RSS is lower):
#
#   traefik   0.25 cpu / 128M   (HTTP-only, no ACME)
#   postgres  0.50 cpu / 768M
#   redis     0.25 cpu / 128M   (broker only; appendonly kept for restart-safety)
#   backend   0.75 cpu / 768M   (2 uvicorn workers default; fine for one evaluator)
#   worker    0.75 cpu / 1280M  (concurrency=1 — no parallel scans on eval)
#   beat      0.25 cpu / 192M
#   frontend  0.25 cpu / 128M
#   --------------------------------
#   sum       3.00 cpu / ~3.4 GB limits — CPU oversubscribes 2 cores (caps, not
#             reservations), RAM sum leaves ~600 MB headroom on a 4 GB host.
#
# Resources for a real source scan still need the full prod worker (6 GB). The
# eval worker can run a SMALL scan but is sized for browsing the seeded data,
# not for production scanning. The docs spell this limit out.

services:
  # ---------------------------------------------------------------------------
  # Edge — Traefik in EVALUATION mode: plain HTTP only, no Let's Encrypt.
  #
  # The base compose runs Traefik with HTTP->HTTPS redirect + ACME HTTP-01,
  # which needs a public DNS name + port 80/443 reachable from the internet —
  # too much friction for a laptop / throwaway VM eval. Here we OVERRIDE the
  # command to a single plain-HTTP `web` entrypoint and re-point the routers to
  # it. We do NOT weaken the prod file: prod security defaults live in
  # docker-compose.yml and are only superseded for this eval layer.
  #
  # The eval routers below do NOT attach `security-headers@file` (the base prod
  # routers reference it, but the base stack does not configure a Traefik file
  # provider for it). HSTS would be a no-op over plain HTTP anyway. This is fine
  # for an evaluation host that is NOT exposed to the public internet — the docs
  # warn against exposing the eval profile.
  # ---------------------------------------------------------------------------
  traefik:
    # Same pinned image as prod (rule #9) — only the command/ports change.
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=trustedoss"
      - "--entrypoints.web.address=:80"
      - "--accesslog=true"
      - "--accesslog.format=json"
      - "--log.level=${TRAEFIK_LOG_LEVEL:-INFO}"
      # Dashboard stays OFF even in eval — keep the attack surface minimal.
      - "--api.dashboard=false"
    # PORTS: we intentionally do NOT re-declare `ports:` here. Compose MERGES
    # `ports` lists across -f files by concatenation (it cannot REMOVE a base
    # entry), so the base file's `80:80` already gives us the HTTP entrypoint we
    # want. The base `443:443` mapping also stays published but is INERT in eval
    # — this Traefik command defines only the plain-HTTP `web` (:80) entrypoint,
    # so nothing listens on 443. The portal is reachable at http://<host>/ . To
    # change the host HTTP port, edit the base file's traefik ports (the overlay
    # cannot override a published port).
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M

  postgres:
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 768M

  redis:
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M

  backend:
    # EVAL routing — add a router on the plain-HTTP `web` entrypoint. Compose
    # MERGES label lists across -f files, so we cannot "remove" the prod tls
    # labels; instead we add a SEPARATE `backend-eval` router on `web` and
    # (re)assert the rule. The base `backend` router stays defined but binds to
    # the `websecure` entrypoint, which eval Traefik does not declare, so it is
    # harmlessly inert (Traefik just skips a router with no matching entrypoint).
    # NOTE: compose MERGES the `environment` map across -f files (later file
    # wins per key), so we only re-declare the keys we OVERRIDE here. The base
    # docker-compose.yml's `*backend-env` (DATABASE_URL, REDIS_URL, SECRET_KEY,
    # CORS, the DB pool + scan tuning knobs, …) still applies. We do NOT repeat
    # `<<: *backend-env` because YAML anchors are file-local — they do not cross
    # `-f` boundaries (compose parses each file independently).
    environment:
      # Eval defaults: demo dataset env. APP_ENV is demo so seed_demo.py is
      # allowed to run (dev/demo allow-list); a single-role DB (the default
      # .env) keeps AUTO_MIGRATE=true so the backend entrypoint applies the
      # schema on start.
      APP_ENV: ${APP_ENV:-demo}
      # Optional external DT for eval — uncomment to close the breaker against a
      # DT you already run. Leaving these unset keeps the breaker OPEN, which is
      # the intended DT-less eval posture (cached / seeded findings are served).
      # DT_URL: ${DT_URL:-}
      # DT_API_KEY: ${DT_API_KEY:-}
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=trustedoss"
      - "traefik.http.services.backend.loadbalancer.server.port=8000"
      - "traefik.http.routers.backend-eval.rule=PathPrefix(`/v1`) || PathPrefix(`/auth`) || PathPrefix(`/ws`) || PathPrefix(`/health`) || PathPrefix(`/metrics`)"
      - "traefik.http.routers.backend-eval.entrypoints=web"
    deploy:
      resources:
        limits:
          cpus: "0.75"
          memory: 768M

  worker:
    # Single worker, single slot — no parallel scans on a 2 vCPU host. The base
    # file already defaults WORKER_REPLICAS=1; we pin concurrency=1 here.
    command: celery -A tasks.celery_app worker --loglevel=info --concurrency=${CELERY_CONCURRENCY:-1}
    # Only override keys — base `*backend-env` still merges in (see backend note).
    environment:
      APP_ENV: ${APP_ENV:-demo}
      # DT_URL: ${DT_URL:-}
      # DT_API_KEY: ${DT_API_KEY:-}
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: "0.75"
          memory: 1280M
        reservations:
          # Floor low enough to schedule on a 4 GB host alongside everything
          # else (the prod 2 GB reservation would not fit).
          cpus: "0.25"
          memory: 512M

  beat:
    # Only override keys — base `*backend-env` still merges in (see backend note).
    environment:
      APP_ENV: ${APP_ENV:-demo}
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 192M

  frontend:
    # EVAL routing — catch-all router on the plain-HTTP `web` entrypoint. The
    # backend-eval router above has higher specificity (PathPrefix) so /v1 etc.
    # still reach the backend. No Host() match in eval so a bare IP / localhost
    # works without a DNS name.
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=trustedoss"
      - "traefik.http.services.frontend.loadbalancer.server.port=8080"
      - "traefik.http.routers.frontend-eval.rule=PathPrefix(`/`)"
      - "traefik.http.routers.frontend-eval.entrypoints=web"
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M
