# TRUSCA — release-gate smoke overlay.
#
# Layered ONLY over the production docker-compose.yml by the `release-gate` job
# in .github/workflows/release.yml (BomLens parity backlog Phase I / P3-12). It
# runs the PUBLISHED multi-arch ghcr images (resolved through ${IMAGE_TAG}) the
# same way an operator would, but publishes the backend + frontend container
# ports on the runner so the documented Quickstart smoke (health → login →
# projects API, reused from install-uat.yml) can reach them WITHOUT Traefik, a
# real DNS domain, or a Let's Encrypt certificate. Traefik is simply left out of
# the `up` service list — nothing in the stack depends on it — so no edge/TLS is
# needed to prove the images boot and serve a first scan.
#
# Compose V1 file format (CLAUDE.md core rule #10: `docker-compose`, hyphenated).
# The published image tags stay pinned to the release version via ${IMAGE_TAG}
# (rule #9: never `:latest`).
#
# NOT for production. Publishing the API/SPA ports bypasses the TLS edge; this
# overlay exists only so CI can gate a release on the freshly published images
# before the GitHub Release is flipped out of draft.
#
# Usage (see release.yml → release-gate):
#   docker-compose -f docker-compose.yml -f docker-compose.smoke.yml \
#     up -d postgres redis backend worker beat frontend

services:
  postgres:
    # Gate-only healthcheck override — fixes the first-live cold-boot race.
    #
    # The base docker-compose.yml probes readiness with `pg_isready` and NO host
    # flag, so it connects over the LOCAL UNIX SOCKET. On a COLD volume the
    # official postgres image runs initdb behind an INTERNAL temporary server
    # started with `listen_addresses=''` (unix socket only, no TCP) to execute
    # /docker-entrypoint-initdb.d/* (here: the trustedoss_app role script). A
    # socket `pg_isready` answers "accepting connections" DURING that bootstrap,
    # so `service_healthy` fires before the REAL server is up on TCP — releasing
    # the backend too early. Its bounded (10 x 3s) alembic-current probe reaches
    # over TCP to postgres:5432, finds no listener mid-initdb, exhausts the budget,
    # and exits; `worker` (depends_on backend: service_healthy) then aborts `up`
    # with "Container is unhealthy". Warm boots skip initdb, so CI never saw it.
    #
    # Forcing a TCP probe (`-h 127.0.0.1`) makes the check FAIL during initdb
    # (the temp server has no TCP listener) and PASS only once the real server
    # accepts network connections — so `service_healthy` becomes truthful. This
    # lives ONLY in the gate overlay; the production base file is untouched, so
    # runtime deployment semantics are unchanged.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 24
      start_period: 10s
  # -------------------------------------------------------------------------
  # DB DSN override — docker-compose V1 (1.29.2) nested-interpolation fix.
  #
  # The production docker-compose.yml resolves the runtime DSN with a NESTED
  # default:
  #   DATABASE_URL_APP: ${DATABASE_URL_APP:-${DATABASE_URL}}
  #   DATABASE_URL:     ${DATABASE_URL_APP:-${DATABASE_URL}}
  # The gate (unlike install.sh) does NOT set DATABASE_URL_APP, so the
  # `:-${DATABASE_URL}` fallback fires. docker-compose V1 1.29.2 — the version
  # the release-gate installs and runs (CLAUDE.md rule #10) — CANNOT parse the
  # inner `${DATABASE_URL}`: its interpolator stops at the FIRST `}`, so the
  # backend/worker/beat receive either a literal `${DATABASE_URL}` (when
  # DATABASE_URL_APP is unset) or a DSN with a stray trailing `}` (when it is
  # set) — e.g. `...:5432/trustedoss}`. Either way the runtime cannot reach the
  # DB and the entrypoint reports the masked "database not reachable" loop.
  # docker-compose V2 expands the nested form correctly, which is why a V2 local
  # run passed while the V1 CI gate failed.
  #
  # This overlay overrides ONLY the two DSN keys for the three DB-touching
  # services with a SINGLE-LEVEL `${DATABASE_URL}` that V1 resolves cleanly.
  # The gate runs a single-role stack (app role == owner in dev mode), so both
  # keys legitimately point at the same DSN. This is GATE-ONLY: the production
  # base file (and its L1 split for real install.sh deployments) is untouched.
  backend:
    environment:
      DATABASE_URL: ${DATABASE_URL}
      DATABASE_URL_APP: ${DATABASE_URL}
    # Expose the API on the runner so the reused install-uat smoke can curl
    # http://localhost:8000/health and /v1/* directly, instead of via Traefik.
    ports:
      - "8000:8000"
  worker:
    environment:
      DATABASE_URL: ${DATABASE_URL}
      DATABASE_URL_APP: ${DATABASE_URL}
  beat:
    environment:
      DATABASE_URL: ${DATABASE_URL}
      DATABASE_URL_APP: ${DATABASE_URL}
  frontend:
    # Expose the SPA so the frontend healthcheck / a browser smoke can reach
    # http://localhost:8080 without the edge proxy.
    ports:
      - "8080:8080"
